<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bola Maluca</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="controles">
        <div class="controle-item">
            <label for="sliderRotacao">Velocidade Angular</label>
            <input id="sliderRotacao" type="range" min="0" max="10" value="2" step="0.5" />
        </div>
        <div class="controle-item">
            <label for="sliderScaleX">Escala X</label>
            <input id="sliderScaleX" type="range" min="0.5" max="3" value="1" step="0.1" />
        </div>
        <div class="controle-item">
            <label for="sliderScaleY">Escala Y</label>
            <input id="sliderScaleY" type="range" min="0.5" max="3" value="1" step="0.1" />
        </div>
    </div>
    
    <canvas id="canvas" width="512" height="512"></canvas>
    
    <script src="Common/initShaders.js"></script>
    <script src="Common/MVnew.js"></script>

    <script src="core/Renderer.js"></script>
    <script src="shapes/Shape.js"></script>
    <script src="shapes/BolaMaluca.js"></script>
    <script src="core/App.js"></script>
</body>
</html>
