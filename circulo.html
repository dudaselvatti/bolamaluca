<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <title>Rotação do círculo</title>
  </head>

  <body>
    <canvas id="gl-canvas" width="800" height="800"> </canvas>
    <br />
    Velocidade Angular: 
    <input id="slider_omega" type="range" min="10" max="360" value="90" step="5" />
    <br />
    Escala X: 
    <input id="slider_scaleX" type="range" min="0.1" max="3" value="1" step="0.1" />
    <br />
    Escala Y: 
    <input id="slider_scaleY" type="range" min="0.1" max="3" value="1" step="0.1" />
    <script id="vertex-shader" type="x-shader/x-vertex">
      #version 300 es

      in vec2 aPosition;
      in vec4 aColor; // buffer de entrada - cores
      uniform float uTheta;

      uniform mat4 uMatrix; // matriz de transformação composta

      out vec4 vColor; // varying - passado para o fragment shader

      void main() {
        //gl_Position = vec4(aPosition, 0.0, 1.0);
        //gl_Position.x = aPosition.x * cos(uTheta) - aPosition.y * sin(uTheta);
        //gl_Position.y = aPosition.x * sin(uTheta) + aPosition.y * cos(uTheta);
        //gl_Position.z = 0.0;
        //gl_Position.w = 1.0;
        gl_Position = uMatrix * vec4(aPosition, 0.0, 1.0);
        vColor = aColor; 
      }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
      #version 300 es
      precision mediump float;

      in vec4 vColor;
      out vec4 fColor;

      void main() {
          //fColor = vec4(1.0, 0.0, 0.0, 1.0);
          fColor = vColor;
      }
    </script>

    <script src="./Common/initShaders.js"></script>
    <script src="./Common/MVnew.js"></script>
    <script src="circulo.js"></script>
  </body>
</html>
